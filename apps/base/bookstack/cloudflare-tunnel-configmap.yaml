apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflare-tunnel-configmap
data:
  config.yaml: |
    tunnel: f3142612-cdee-4f88-80a7-a65c4ad21de4
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true
    ingress:
      - hostname: wiki.kubelaba.com
        service: http://bookstack:80
      - service: http_status:404
