apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: renovate
              image: renovate/renovate:latest
              envFrom:
                - secretRef:
                    name: renovate-secret
                - configMapRef:
                    name: renovate-configmap
          restartPolicy: Never
